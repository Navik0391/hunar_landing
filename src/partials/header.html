<header
  id="main-header"
  class="fixed w-full top-0 z-50 py-4 backdrop-blur-sm border-b border-white/10 transition-colors duration-500"
>
  <div class="container flex items-center justify-between relative">
    <div class="z-50 relative">
      <a href="#hero">
        <img src="/logo-white.png" class="w-28 md:w-32" alt="Hunar logo" />
      </a>
    </div>

    <!-- Десктопное меню -->
    <nav class="hidden md:flex items-center gap-6 lg:gap-8">
      <a
        href="#popular-categories"
        class="text-white hover:text-white/80 font-medium transition-colors duration-300"
      >
        Категории
      </a>
      <a
        href="#order-place"
        class="text-white hover:text-white/80 font-medium transition-colors duration-300"
      >
        Как оставить заказ
      </a>
      <a
        href="#trust"
        class="text-white hover:text-white/80 font-medium transition-colors duration-300"
      >
        Почему нам доверяют?
      </a>
      <a
        href="#how-to-become-a-repairman"
        class="text-white hover:text-white/80 font-medium transition-colors duration-300"
      >
        Как стать специалистом
      </a>

      <a
        href="#modal-callback"
        class="px-5 py-2 rounded-full border border-white/30 text-white hover:bg-white hover:text-gray-900 font-medium transition-all duration-300"
      >
        Оставить заявку
      </a>
    </nav>

    <!-- Гамбургер-кнопка -->
    <button
      id="mobile-menu-btn"
      class="md:hidden relative z-50 w-8 h-8 flex items-center justify-center focus:outline-none"
    >
      <span class="sr-only">Открыть меню</span>
      <div class="relative w-6 h-5">
        <span
          id="burger-line-1"
          class="absolute top-0 left-0 w-full h-0.5 bg-white rounded transition-all duration-300"
        ></span>
        <span
          id="burger-line-2"
          class="absolute top-1/2 -translate-y-1/2 left-0 w-full h-0.5 bg-white rounded transition-all duration-300"
        ></span>
        <span
          id="burger-line-3"
          class="absolute bottom-0 left-0 w-full h-0.5 bg-white rounded transition-all duration-300"
        ></span>
      </div>
    </button>

    <!-- Мобильное меню -->
    <div
      id="mobile-menu-overlay"
      class="fixed top-0 left-0 w-full h-dvh bg-secondary/95 backdrop-blur-xl z-40 flex flex-col justify-center items-center gap-8 md:hidden transition-all duration-500 opacity-0 pointer-events-none"
    >
      <a
        href="#popular-categories"
        class="mobile-link text-white text-2xl font-bold hover:text-primary transition-colors translate-y-4 opacity-0"
      >
        Категории
      </a>
      <a
        href="#order-place"
        class="mobile-link text-white text-2xl font-bold hover:text-primary transition-colors translate-y-4 opacity-0"
      >
        Как оставить заказ
      </a>
      <a
        href="#trust"
        class="mobile-link text-white text-2xl font-bold hover:text-primary transition-colors translate-y-4 opacity-0"
      >
        Почему нам доверяют?
      </a>
      <a
        href="#how-to-become-a-repairman"
        class="mobile-link text-white text-2xl font-bold hover:text-primary transition-colors translate-y-4 opacity-0"
      >
        Как стать специалистом
      </a>
      <div
        class="w-16 h-px bg-white/20 my-2 translate-y-4 opacity-0 mobile-link-divider transition-all"
      ></div>
      <a
        href="#modal-callback"
        class="mobile-link text-primary text-xl font-bold px-8 py-3 rounded-full border-2 border-primary hover:bg-primary hover:text-white transition-all translate-y-4 opacity-0"
      >
        Оставить заявку
      </a>
    </div>
  </div>
</header>
